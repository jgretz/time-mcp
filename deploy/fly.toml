app = 'joshgretz-time-mcp'
primary_region = 'ewr'

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  OAUTH_ISSUER = "https://joshgretz-mcp-auth.fly.dev"
  MCP_RESOURCE = "https://joshgretz-time-mcp.fly.dev/mcp"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/ping"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
